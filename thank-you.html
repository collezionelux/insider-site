<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Welcome — INSIDER Method™</title>
<meta name="robots" content="noindex,nofollow" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --ink-void: #0A0A0B;
    --ink-graphite: #131316;
    --ink-smoke: #1E1E22;
    --ink-steel: #2A2A2F;
    --text-ivory: #F2EFE7;
    --text-bone: #D4D0C4;
    --text-archive: #8C887D;
    --text-mute: #56544D;
    --brass: #A88A4A;
    --brass-bright: #C9A55C;
    --font-editorial: 'Cormorant Garamond', Georgia, serif;
    --font-institutional: 'Inter', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
    --ease: cubic-bezier(0.22, 0.61, 0.36, 1.0);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--ink-void);
    color: var(--text-ivory);
    font-family: var(--font-institutional);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .grain {
    position: fixed; inset: 0; z-index: 1;
    pointer-events: none; opacity: 0.04;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }
  .container {
    max-width: 600px;
    width: 100%;
    text-align: center;
    position: relative;
    z-index: 2;
    animation: fade-up 1.2s var(--ease);
  }
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .wordmark {
    font-family: var(--font-editorial);
    font-size: 24px;
    letter-spacing: 0.08em;
    color: var(--text-ivory);
    font-weight: 500;
    margin-bottom: 64px;
    display: inline-block;
  }
  .wordmark sup { font-size: 12px; color: var(--text-archive); margin-left: 2px; }
  .badge {
    display: inline-block;
    padding: 10px 24px;
    border: 0.5px solid var(--brass);
    color: var(--brass);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    margin-bottom: 40px;
  }
  h1 {
    font-family: var(--font-editorial);
    font-size: clamp(48px, 8vw, 96px);
    line-height: 1;
    letter-spacing: -0.02em;
    color: var(--text-ivory);
    margin-bottom: 24px;
    font-weight: 500;
  }
  h1 em {
    color: var(--brass);
    font-style: italic;
  }
  .lead {
    font-family: var(--font-editorial);
    font-style: italic;
    font-size: 22px;
    line-height: 1.5;
    color: var(--text-bone);
    margin-bottom: 64px;
    max-width: 460px;
    margin-left: auto;
    margin-right: auto;
  }
  .mega-cta {
    display: inline-flex;
    align-items: center;
    gap: 20px;
    padding: 24px 56px;
    background: var(--brass);
    color: var(--ink-void);
    font-family: var(--font-mono);
    font-size: 13px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    text-decoration: none;
    cursor: pointer;
    border: none;
    font-weight: 700;
    transition: all 0.4s var(--ease);
    box-shadow: 0 0 0 1px var(--brass), 0 0 40px rgba(168, 138, 74, 0.2);
  }
  .mega-cta:hover {
    background: var(--brass-bright);
    transform: translateY(-2px);
    box-shadow: 0 12px 48px rgba(168, 138, 74, 0.4);
  }
  .mega-cta .arrow {
    transition: transform 0.4s var(--ease);
  }
  .mega-cta:hover .arrow {
    transform: translateX(8px);
  }
  .footer-note {
    margin-top: 56px;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-mute);
    line-height: 2;
  }
  .brass-rule {
    width: 48px;
    height: 0.5px;
    background: var(--brass);
    margin: 56px auto;
  }
</style>
</head>
<body>

<div class="grain"></div>

<div class="container">
  <div class="wordmark">INSIDER<sup>&trade;</sup></div>
  
  <div class="badge">&#10003; Cohort III &middot; Filed</div>
  
  <h1>Benvenuto.<br/>Sei <em>dentro</em>.</h1>
  
  <p class="lead">La sessione &egrave; pronta. Stai per essere reindirizzato.</p>
  
  <a href="#" class="mega-cta" onclick="goToArchive(event)">
    Enter the Archive
    <span class="arrow">&rarr;</span>
  </a>
  
  <div class="brass-rule"></div>
  
  <div class="footer-note">
    INSIDER&trade; &middot; MMXXVI &middot; Milano
  </div>
</div>

<script>
  function goToArchive(e) {
    e.preventDefault();
    alert('Qui andra il link alla member area di Hotmart');
  }
</script>

</body>
</html>
